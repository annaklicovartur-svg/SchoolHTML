<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная карта - Поиск улиц</title>
    
    <!-- Подключаем Leaflet CSS и JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
        }
        
        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .toggle-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 3;
            background: #667eea;
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-panel:hover {
            background: #764ba2;
            transform: scale(1.05);
        }
        
        .control-panel {
            position: fixed;
            top: 20px;
            right: 90px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            color: white;
            width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease, opacity 0.3s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .control-panel.hidden {
            transform: translateX(400px);
            opacity: 0;
            pointer-events: none;
        }
        
        .control-panel h3 {
            margin-bottom: 15px;
            color: #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .control-panel h3 button {
            background: rgba(255,255,255,0.2);
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .search-section {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .search-section h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #ffd700;
        }
        
        .search-section input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
        }
        
        .search-section input:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }
        
        .search-section input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .search-section button {
            background: #ff9800;
            margin-top: 5px;
        }
        
        .search-section button:hover {
            background: #f57c00;
        }
        
        .control-panel input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 14px;
        }
        
        .control-panel input:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }
        
        .control-panel input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .control-panel textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            resize: vertical;
            font-family: inherit;
            font-size: 14px;
        }
        
        .control-panel textarea:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
        }
        
        .photo-upload {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        
        .photo-upload label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        
        .photo-upload input {
            padding: 5px;
            font-size: 12px;
        }
        
        .current-photo {
            margin-top: 5px;
            text-align: center;
        }
        
        .current-photo img {
            max-width: 100%;
            max-height: 100px;
            border-radius: 8px;
            margin-top: 5px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
        }
        
        button:hover {
            background: #764ba2;
            transform: scale(1.02);
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .points-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 10px;
        }
        
        .points-list strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .point-item {
            background: rgba(255,255,255,0.1);
            padding: 8px 10px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            transition: background 0.2s;
        }
        
        .point-item:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .point-item span {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .delete-point {
            background: #dc3545;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            width: auto;
            margin: 0;
        }
        
        .delete-point:hover {
            background: #c82333;
            transform: scale(1.05);
        }
        
        .instruction {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-size: 12px;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .instruction.hidden {
            opacity: 0;
        }
        
        .points-counter {
            background: #667eea;
            border-radius: 10px;
            padding: 5px 10px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
        }
        
        .popup-content {
            min-width: 250px;
            max-width: 350px;
        }
        
        .popup-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .popup-content h3 {
            color: #667eea;
            margin: 0 0 10px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        
        .search-result-marker {
            animation: pulse 1s ease-in-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        .control-panel::-webkit-scrollbar {
            width: 5px;
        }
        
        .control-panel::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
        
        .control-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 5px;
        }
        
        @media (max-width: 768px) {
            .control-panel {
                width: calc(100% - 100px);
                right: 80px;
                max-height: 70vh;
            }
            
            .toggle-panel {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <button class="toggle-panel" id="togglePanelBtn">◀</button>
    
    <div class="control-panel" id="controlPanel">
        <h3>
            📍 Управление точками
            <button id="hidePanelBtn" style="width: auto; padding: 5px 10px;">✖️</button>
        </h3>
        
        <!-- БЛОК ПОИСКА УЛИЦ - ИСПРАВЛЕННЫЙ -->
        <div class="search-section">
            <h4>🔍 Поиск улицы или места</h4>
            <input type="text" id="searchInput" placeholder="Например: ул. Киевская, Бишкек или ЦУМ">
            <button id="searchBtn">🔎 Найти и приблизить</button>
            <div id="searchStatus" style="font-size: 11px; margin-top: 5px; color: #ffd700; display: none;"></div>
        </div>
        
        <input type="text" id="pointName" placeholder="📌 Название точки (например, Магазин ГЭСЗ)">
        <textarea id="pointInfo" rows="3" placeholder="ℹ️ Информация о точке&#10;Адрес, телефон, описание и т.д."></textarea>
        
        <div class="photo-upload">
            <label>📸 Фото для точки:</label>
            <input type="file" id="pointPhoto" accept="image/*">
            <div class="current-photo" id="currentPhotoPreview"></div>
        </div>
        
        <button id="addPointBtn" class="btn-success">➕ Добавить точку</button>
        <button id="clearPointsBtn" class="btn-danger">🗑️ Очистить все</button>
        
        <div class="points-list">
            <strong>📌 Список точек:</strong>
            <div id="pointsList"></div>
        </div>
        
        <div class="points-counter" id="pointsCounter">
            Всего точек: 0
        </div>
    </div>
    
    <div class="instruction" id="instruction">
        💡 Кликни на карту, чтобы добавить точку<br>
        🔍 Введи улицу - карта приблизится к ней<br>
        📸 Добавляй фото к точкам
    </div>
    
    <script>
        // Инициализация карты (центр - Бишкек)
        var map = L.map('map').setView([42.8746, 74.5698], 13);
        
        // Слой карты
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);
        
        // Переменная для временного маркера поиска
        var tempSearchMarker = null;
        
        // Функция поиска с приближением
        async function searchAndZoom(query) {
            var statusDiv = document.getElementById('searchStatus');
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '⏳ Ищу...';
            
            try {
                // Добавляем Бишкек для локального поиска, если не указан город
                var searchQuery = query;
                if (!query.toLowerCase().includes('бишкек') && !query.toLowerCase().includes('bishkek')) {
                    searchQuery = query + ', Бишкек, Кыргызстан';
                }
                
                var response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchQuery)}&limit=5&addressdetails=1`);
                var data = await response.json();
                
                if (data && data.length > 0) {
                    // Берём первый результат
                    var result = data[0];
                    var lat = parseFloat(result.lat);
                    var lng = parseFloat(result.lon);
                    var displayName = result.display_name;
                    
                    // Приближаем карту к найденному месту (zoom 16 - детальный уровень)
                    map.setView([lat, lng], 17);
                    
                    // Удаляем предыдущий временный маркер если есть
                    if (tempSearchMarker) {
                        map.removeLayer(tempSearchMarker);
                    }
                    
                    // Создаём специальный маркер для результата поиска
                    var customIcon = L.divIcon({
                        className: 'search-result-marker',
                        html: '📍',
                        iconSize: [30, 30],
                        popupAnchor: [0, -15]
                    });
                    
                    tempSearchMarker = L.marker([lat, lng], {icon: customIcon}).addTo(map);
                    tempSearchMarker.bindPopup(`
                        <div style="text-align: center;">
                            <strong>🔍 Найдено:</strong><br>
                            ${displayName.substring(0, 100)}${displayName.length > 100 ? '...' : ''}
                        </div>
                    `).openPopup();
                    
                    // Автоматически скрываем маркер через 5 секунд
                    setTimeout(() => {
                        if (tempSearchMarker) {
                            map.removeLayer(tempSearchMarker);
                            tempSearchMarker = null;
                        }
                    }, 5000);
                    
                    statusDiv.innerHTML = '✅ Найдено! Карта приближена.';
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                    
                } else {
                    statusDiv.innerHTML = '❌ Ничего не найдено. Попробуйте другой запрос.';
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                console.error('Ошибка поиска:', error);
                statusDiv.innerHTML = '❌ Ошибка при поиске. Проверьте соединение.';
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 3000);
            }
        }
        
        // Обработчик поиска
        document.getElementById('searchBtn').addEventListener('click', function() {
            var query = document.getElementById('searchInput').value.trim();
            if (query) {
                searchAndZoom(query);
            } else {
                alert('Введите название улицы или места для поиска');
            }
        });
        
        // Поиск по Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });
        
        // Массив для хранения точек
        var points = [];
        var markers = {};
        
        function savePoints() {
            var pointsToSave = points.map(point => ({
                ...point,
                photoData: point.photoData || null
            }));
            localStorage.setItem('mapPoints', JSON.stringify(pointsToSave));
        }
        
        function loadPoints() {
            var saved = localStorage.getItem('mapPoints');
            if (saved) {
                points = JSON.parse(saved);
                points.forEach(point => {
                    addMarkerToMap(point);
                });
                updatePointsList();
                updateCounter();
            }
        }
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                var reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
        
        var currentPhotoData = null;
        var currentPhotoName = null;
        
        document.getElementById('pointPhoto').addEventListener('change', async function(e) {
            var file = e.target.files[0];
            if (file) {
                currentPhotoName = file.name;
                currentPhotoData = await fileToBase64(file);
                
                var preview = document.getElementById('currentPhotoPreview');
                preview.innerHTML = `<img src="${currentPhotoData}" alt="Preview"><br><small>${file.name}</small>`;
            }
        });
        
        function addMarkerToMap(point) {
            var marker = L.marker([point.lat, point.lng]).addTo(map);
            
            var photoHtml = '';
            if (point.photoData) {
                photoHtml = `<img src="${point.photoData}" alt="Фото точки" style="max-width:100%; border-radius:8px; margin:10px 0;"><br>`;
            }
            
            marker.bindPopup(`
                <div class="popup-content">
                    <h3>${escapeHtml(point.name)}</h3>
                    ${photoHtml}
                    <div style="white-space: pre-line; line-height: 1.4;">${escapeHtml(point.info)}</div>
                    <hr style="margin: 10px 0;">
                    <small style="color: #666;">📍 ${point.lat.toFixed(5)}, ${point.lng.toFixed(5)}</small>
                    <br>
                    <button onclick="deletePointById(${point.id})" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:5px; margin-top:8px; cursor:pointer; width:100%;">🗑️ Удалить точку</button>
                </div>
            `);
            
            markers[point.id] = marker;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function updateCounter() {
            document.getElementById('pointsCounter').innerHTML = `📊 Всего точек: ${points.length}`;
        }
        
        function updatePointsList() {
            var listDiv = document.getElementById('pointsList');
            if (points.length === 0) {
                listDiv.innerHTML = '<div style="color: rgba(255,255,255,0.5); text-align: center; padding: 10px;">Нет добавленных точек</div>';
                updateCounter();
                return;
            }
            
            listDiv.innerHTML = '';
            points.forEach(point => {
                var item = document.createElement('div');
                item.className = 'point-item';
                var hasPhotoIcon = point.photoData ? '📸 ' : '📍 ';
                item.innerHTML = `
                    <span title="${escapeHtml(point.name)}">${hasPhotoIcon}${escapeHtml(point.name.substring(0, 30))}${point.name.length > 30 ? '...' : ''}</span>
                    <button class="delete-point" data-id="${point.id}" style="width: auto;">✖️</button>
                `;
                
                item.querySelector('span').addEventListener('click', () => {
                    map.setView([point.lat, point.lng], 16);
                    markers[point.id].openPopup();
                });
                
                item.querySelector('.delete-point').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deletePoint(point.id);
                });
                
                listDiv.appendChild(item);
            });
            updateCounter();
        }
        
        window.deletePointById = function(id) {
            deletePoint(id);
        };
        
        function deletePoint(id) {
            if (confirm('Удалить эту точку?')) {
                if (markers[id]) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
                
                points = points.filter(point => point.id !== id);
                savePoints();
                updatePointsList();
            }
        }
        
        async function addPoint(lat, lng, name, info) {
            if (!name.trim()) {
                alert('Введите название точки!');
                return false;
            }
            
            var newPoint = {
                id: Date.now(),
                lat: lat,
                lng: lng,
                name: name.trim(),
                info: info.trim() || 'Нет дополнительной информации',
                photoData: currentPhotoData || null,
                photoName: currentPhotoName || null
            };
            
            points.push(newPoint);
            addMarkerToMap(newPoint);
            savePoints();
            updatePointsList();
            
            currentPhotoData = null;
            currentPhotoName = null;
            document.getElementById('pointPhoto').value = '';
            document.getElementById('currentPhotoPreview').innerHTML = '';
            
            return true;
        }
        
        map.on('click', async function(e) {
            var name = prompt('Введите название места:');
            if (name && name.trim()) {
                var info = prompt('Введите информацию о месте (адрес, описание и т.д.):');
                await addPoint(e.latlng.lat, e.latlng.lng, name, info || '');
            } else if (name === '') {
                alert('Название не может быть пустым!');
            }
        });
        
        document.getElementById('addPointBtn').addEventListener('click', async function() {
            var name = document.getElementById('pointName').value;
            var info = document.getElementById('pointInfo').value;
            var center = map.getCenter();
            
            if (await addPoint(center.lat, center.lng, name, info)) {
                document.getElementById('pointName').value = '';
                document.getElementById('pointInfo').value = '';
            }
        });
        
        document.getElementById('clearPointsBtn').addEventListener('click', function() {
            if (confirm('🗑️ Удалить все точки? Это действие нельзя отменить.')) {
                Object.keys(markers).forEach(id => {
                    map.removeLayer(markers[id]);
                });
                markers = {};
                points = [];
                savePoints();
                updatePointsList();
            }
        });
        
        var panel = document.getElementById('controlPanel');
        var toggleBtn = document.getElementById('togglePanelBtn');
        var hideBtn = document.getElementById('hidePanelBtn');
        var instruction = document.getElementById('instruction');
        
        function hidePanel() {
            panel.classList.add('hidden');
            toggleBtn.innerHTML = '▶';
            instruction.classList.add('hidden');
        }
        
        function showPanel() {
            panel.classList.remove('hidden');
            toggleBtn.innerHTML = '◀';
            instruction.classList.remove('hidden');
        }
        
        toggleBtn.addEventListener('click', function() {
            if (panel.classList.contains('hidden')) {
                showPanel();
            } else {
                hidePanel();
            }
        });
        
        hideBtn.addEventListener('click', hidePanel);
        
        loadPoints();
        
        setTimeout(() => {
            if (points.length === 0) {
                var examples = [

                ];
                
                examples.forEach(ex => {
                    addPoint(ex.lat, ex.lng, ex.name, ex.info);
                });
            }
        }, 500);
    </script>
</body>
</html>
